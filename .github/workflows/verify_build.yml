name: Verify Build

on:
    pull_request:
        branches: [main]

jobs:
    run-build:
        runs-on: ubuntu-latest
        steps:
            - name: Set up JDK21
              uses: actions/setup-java@v3
              with:
                  distribution: 'temurin'
                  java-version: '21'
            - name: Build with Gradle
              run: ./gradlew clean build